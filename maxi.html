<body>
  <div id="content"></div>

  <footer class="site-footer">
    <p>Made by Jóhann Ísaksson in Reykjavík</p>
    <p><a href="about.html">About</a> · <a href="privacy.html">Privacy</a></p>
    <p>© 2026 Croosly</p>
  </footer>
  <script>
    (function () {
      const content = document.getElementById('content');

      function renderPlay(puzzleIndex) {
        const safeIndex = Math.max(0, Math.min(PUZZLES.length - 1, puzzleIndex | 0));
        document.title = 'Maxi #' + (safeIndex + 1) + ' — Croosly';

        content.innerHTML = '';
        const root = document.createElement('div');
        root.id = 'root';
        content.appendChild(root);

        window.mountCrosswordGame({
          rootId: 'root',
          title: 'Maxi Crossword',
          eyebrowText: '← Back to Maxi',
          eyebrowHref: 'maxi.html',
          statsKey: 'croosly-maxi-stats',
          puzzles: PUZZLES,
          shareLabel: 'Maxi',
          shareUrl: 'https://croosly.com/maxi.html?p=' + safeIndex,
          initialPuzzleIndex: safeIndex,
          packId: 'maxi',
          puzzleSize: 'maxi',
        });
      }

      function renderList() {
        window.renderPuzzleList({
          container: content,
          eyebrowText: '← All Puzzles',
          eyebrowHref: 'index.html',
          emoji: '📰',
          title: 'Maxi',
          description: 'The full New York Times-style 15 × 15. Around seventy clues, half an hour or so — deeper waters.',
          accentColor: '#991b1b',
          puzzles: PUZZLES,
          statsKey: 'croosly-maxi-stats',
          defaultSize: 'maxi',
          metaItems: ['~70 clues per puzzle', '~25 min each'],
          hrefForPuzzle: function (i) { return 'maxi.html?p=' + i; },
        });
      }

      const params = new URLSearchParams(window.location.search);
      const playParam = params.get('p');
      if (playParam !== null) {
        renderPlay(parseInt(playParam, 10));
      } else {
        renderList();
      }
    })();
  </script>
</body>
</html>
