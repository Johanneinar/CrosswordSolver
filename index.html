<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrosswordSolver</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      font-family: 'Libre Baskerville', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      color: #1a1a1a;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 32px;
      width: 100%;
      max-width: 780px;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 16px;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }
    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .header-dateline {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-bottom: 4px;
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-timer {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: #444;
    }
    .header-stats-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 0 2px;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .header-stats-btn:hover { opacity: 1; }

    /* MAIN LAYOUT */
    .puzzle-layout {
      display: flex;
      gap: 48px;
      width: 100%;
      max-width: 780px;
      align-items: flex-start;
    }
    .grid-section { flex-shrink: 0; }
    .grid-wrap { position: relative; display: inline-block; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      grid-template-rows: repeat(5, 58px);
      border: 2px solid #1a1a1a;
    }
    .cell {
      width: 58px;
      height: 58px;
      border: 1px solid #1a1a1a;
      background: #ffffff;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }
    .cell.black { background: #1a1a1a; cursor: default; }
    .cell.highlighted { background: #dce8f5; }
    .cell.selected { background: #d4a843; }
    .cell.correct { background: #c8e6c9; }
    .cell.wrong { background: #ffcdd2; }
    .cell-number {
      position: absolute;
      top: 3px;
      left: 3px;
      font-size: 9px;
      font-weight: 400;
      font-family: 'Libre Baskerville', serif;
      color: #1a1a1a;
      line-height: 1;
    }

    /* CONTROLS */
    .controls { display: flex; gap: 12px; margin-top: 18px; }
    .btn {
      padding: 8px 20px;
      font-family: 'Libre Baskerville', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1.5px solid #1a1a1a;
      background: transparent;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #1a1a1a; color: #f5f0e8; }
    .btn.btn-primary { background: #1a1a1a; color: #f5f0e8; }
    .btn.btn-primary:hover { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:disabled:hover { background: transparent; color: #1a1a1a; }
    .btn.btn-primary:disabled:hover { background: #1a1a1a; color: #f5f0e8; }

    /* MOBILE KEYBOARD */
    .mobile-keyboard { display: none; margin-top: 16px; }
    @media (max-width: 639px) { .mobile-keyboard { display: block; } }
    .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
    .kb-key {
      width: 30px; height: 40px;
      font-family: 'Libre Baskerville', serif;
      font-size: 13px; font-weight: 700;
      border: 1.5px solid #1a1a1a;
      background: #fff; cursor: pointer;
      transition: background 0.1s;
    }
    .kb-key:active { background: #d4a843; }
    .kb-wide { width: 64px; font-size: 16px; }

    /* CLUES */
    .clues-section { flex: 1; min-width: 0; }
    .clue-group { margin-bottom: 24px; }
    .clue-group-title {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .clue {
      display: flex;
      gap: 8px;
      padding: 4px 6px;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 2px;
      cursor: pointer;
    }
    .clue:hover { background: rgba(212, 168, 67, 0.2); }
    .clue.active { background: #d4a843; }
    .clue-num { font-weight: 700; flex-shrink: 0; min-width: 18px; }

    /* DIALOGS */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .dialog-card {
      background: #f5f0e8;
      border: 2px solid #1a1a1a;
      padding: 32px 40px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }
    .dialog-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .dialog-body {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
      font-style: italic;
    }
    .dialog-buttons { display: flex; gap: 12px; justify-content: center; }

    /* STATS MODAL */
    .stats-grid { display: flex; gap: 32px; justify-content: center; margin-bottom: 28px; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }

    /* COMPLETION OVERLAY */
    .completion-overlay {
      position: absolute;
      inset: -2px;
      background: rgba(245, 240, 232, 0.94);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border: 2px solid #1a1a1a;
      pointer-events: none;
    }
    .completion-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .completion-time {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .completion-rule { width: 40px; height: 1px; background: #1a1a1a; margin-bottom: 14px; }
    .completion-sub { font-size: 12px; color: #888; font-style: italic; }

    /* RESPONSIVE */
    @media (max-width: 639px) {
      .puzzle-layout { flex-direction: column; align-items: center; }
      .header-title { font-size: 32px; }
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="puzzles.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const PUZZLE = getDailyPuzzle();

    const CELL_NUMBERS = (() => {
      const map = {};
      [...PUZZLE.clues.across, ...PUZZLE.clues.down].forEach(({ number, row, col }) => {
        map[`${row},${col}`] = number;
      });
      return map;
    })();

    // ── HELPERS ──────────────────────────────────────────────────

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function getPuzzleDate() {
      const d = new Date(EPOCH);
      d.setDate(d.getDate() + PUZZLE.dayIndex);
      return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getWordCells(direction, row, col, solution) {
      if (solution[row][col] === null) return [];
      const cells = [];
      if (direction === 'across') {
        let c = col;
        while (c > 0 && solution[row][c - 1] !== null) c--;
        while (c < 5 && solution[row][c] !== null) { cells.push({ row, col: c }); c++; }
      } else {
        let r = row;
        while (r > 0 && solution[r - 1][col] !== null) r--;
        while (r < 5 && solution[r][col] !== null) { cells.push({ row: r, col }); r++; }
      }
      return cells.length >= 2 ? cells : [];
    }

    function hasWord(direction, row, col, solution) {
      return getWordCells(direction, row, col, solution).length >= 2;
    }

    function getActiveClue(direction, row, col, clues, solution) {
      const wordCells = getWordCells(direction, row, col, solution);
      if (wordCells.length === 0) return null;
      const { row: r0, col: c0 } = wordCells[0];
      return clues[direction].find(c => c.row === r0 && c.col === c0) || null;
    }

    function getValidDirection(direction, row, col, solution) {
      if (hasWord(direction, row, col, solution)) return direction;
      const other = direction === 'across' ? 'down' : 'across';
      return hasWord(other, row, col, solution) ? other : direction;
    }

    function checkSolved(userGrid, solution) {
      for (let r = 0; r < 5; r++)
        for (let c = 0; c < 5; c++)
          if (solution[r][c] !== null && userGrid[r][c] !== solution[r][c]) return false;
      return true;
    }

    // ── STATS ────────────────────────────────────────────────────

    function loadStats() {
      try {
        return JSON.parse(localStorage.getItem('crossword-stats')) || { solves: [], bestTime: null, streak: 0, lastSolveDate: null };
      } catch { return { solves: [], bestTime: null, streak: 0, lastSolveDate: null }; }
    }

    function recordSolve(timeSeconds) {
      const today = new Date().toISOString().slice(0, 10);
      const stats = loadStats();
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

      if (stats.lastSolveDate === today) return; // already recorded today

      stats.solves.push({ date: today, time: timeSeconds });
      stats.bestTime = stats.bestTime === null ? timeSeconds : Math.min(stats.bestTime, timeSeconds);

      if (stats.lastSolveDate === yesterday) {
        stats.streak = (stats.streak || 0) + 1;
      } else {
        stats.streak = 1;
      }
      stats.lastSolveDate = today;

      localStorage.setItem('crossword-stats', JSON.stringify(stats));
    }

    // ── COMPONENTS ───────────────────────────────────────────────

    function Cell({ row, col, letter, isBlack, isSelected, isHighlighted, cellState, number, onClick }) {
      if (isBlack) return <div className="cell black" aria-hidden="true" />;

      let className = 'cell';
      if (isSelected) className += ' selected';
      else if (isHighlighted) className += ' highlighted';
      if (cellState === 'correct') className += ' correct';
      if (cellState === 'wrong') className += ' wrong';

      return (
        <div
          className={className}
          onClick={onClick}
          role="gridcell"
          tabIndex={0}
          aria-selected={isSelected}
          aria-label={`Row ${row + 1}, column ${col + 1}${letter ? ', letter ' + letter : ''}`}
        >
          {number && <span className="cell-number">{number}</span>}
          {letter}
        </div>
      );
    }

    function Grid({ solution, userGrid, selectedCell, highlightedCells, cellStates, onCellClick }) {
      return (
        <div className="grid" role="grid" aria-label="Crossword grid">
          {solution.map((row, r) =>
            row.map((cell, c) => (
              <Cell
                key={`${r},${c}`}
                row={r} col={c}
                letter={userGrid[r][c]}
                isBlack={cell === null}
                isSelected={!!(selectedCell && selectedCell.row === r && selectedCell.col === c)}
                isHighlighted={highlightedCells.has(`${r},${c}`)}
                cellState={cellStates[r][c]}
                number={CELL_NUMBERS[`${r},${c}`]}
                onClick={() => onCellClick(r, c)}
              />
            ))
          )}
        </div>
      );
    }

    function Header({ timerSeconds, timerStarted, solved, onStatsClick }) {
      const time = (timerStarted || solved) ? formatTime(timerSeconds) : '0:00';
      return (
        <header className="header">
          <div className="header-eyebrow">The Daily Crossword</div>
          <h1 className="header-title">Mini Crossword</h1>
          <div className="header-dateline">{getPuzzleDate()}</div>
          <div className="header-meta">
            <span className="header-timer">{time}</span>
            <button className="header-stats-btn" onClick={onStatsClick} aria-label="View stats">📊</button>
          </div>
        </header>
      );
    }

    function ClueList({ clues, activeClue, onClueClick }) {
      const isActive = (dir, entry) =>
        activeClue && activeClue.direction === dir && activeClue.number === entry.number;

      return (
        <div className="clues-section">
          {['across', 'down'].map(dir => (
            <div className="clue-group" key={dir}>
              <div className="clue-group-title">{dir}</div>
              {clues[dir].map(entry => (
                <div
                  key={entry.number}
                  className={`clue${isActive(dir, entry) ? ' active' : ''}`}
                  onClick={() => onClueClick(dir, entry)}
                >
                  <span className="clue-num">{entry.number}</span>
                  <span>{entry.clue}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }

    function Controls({ onCheck, onReveal, solved, revealed }) {
      return (
        <div className="controls">
          <button className="btn btn-primary" onClick={onCheck} disabled={solved || revealed}>Check</button>
          <button className="btn" onClick={onReveal} disabled={solved || revealed}>Reveal</button>
        </div>
      );
    }

    function MobileKeyboard({ onKey }) {
      const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
      return (
        <div className="mobile-keyboard">
          {rows.map(row => (
            <div className="kb-row" key={row}>
              {row.split('').map(k => (
                <button key={k} className="kb-key" onClick={() => onKey(k)}>{k}</button>
              ))}
            </div>
          ))}
          <div className="kb-row">
            <button className="kb-key kb-wide" onClick={() => onKey('Backspace')}>⌫</button>
          </div>
        </div>
      );
    }

    function StatsModal({ onClose }) {
      const stats = loadStats();
      return (
        <div className="dialog-backdrop" onClick={onClose}>
          <div className="dialog-card" onClick={e => e.stopPropagation()}>
            <div className="dialog-title">Your Stats</div>
            <div className="stats-grid">
              <div className="stat">
                <span className="stat-num">{stats.solves.length}</span>
                <span className="stat-label">Solved</span>
              </div>
              <div className="stat">
                <span className="stat-num">{stats.streak}</span>
                <span className="stat-label">Streak</span>
              </div>
              <div className="stat">
                <span className="stat-num">{stats.bestTime !== null ? formatTime(stats.bestTime) : '—'}</span>
                <span className="stat-label">Best</span>
              </div>
            </div>
            <div className="dialog-buttons">
              <button className="btn btn-primary" onClick={onClose}>Done</button>
            </div>
          </div>
        </div>
      );
    }

    function RevealDialog({ onConfirm, onCancel }) {
      return (
        <div className="dialog-backdrop" onClick={onCancel}>
          <div className="dialog-card" onClick={e => e.stopPropagation()}>
            <div className="dialog-title">Reveal Answers?</div>
            <div className="dialog-body">This will fill in all answers and cannot be undone.</div>
            <div className="dialog-buttons">
              <button className="btn" onClick={onCancel}>Cancel</button>
              <button className="btn btn-primary" onClick={onConfirm}>Reveal</button>
            </div>
          </div>
        </div>
      );
    }

    function CompletionOverlay({ timerSeconds, visible }) {
      const [opacity, setOpacity] = useState(0);

      useEffect(() => {
        if (!visible) { setOpacity(0); return; }
        const showId = setTimeout(() => setOpacity(1), 50);
        const hideId = setTimeout(() => setOpacity(0), 4000);
        return () => { clearTimeout(showId); clearTimeout(hideId); };
      }, [visible]);

      if (!visible && opacity === 0) return null;

      return (
        <div className="completion-overlay" style={{ opacity, transition: 'opacity 0.5s ease' }}>
          <div className="completion-title">Solved!</div>
          <div className="completion-time">{formatTime(timerSeconds)}</div>
          <div className="completion-rule" />
          <div className="completion-sub">{getPuzzleDate()}</div>
        </div>
      );
    }

    // ── APP ──────────────────────────────────────────────────────

    function App() {
      const [userGrid, setUserGrid] = useState(() => PUZZLE.solution.map(row => row.map(() => '')));
      const [cellStates, setCellStates] = useState(() => Array(5).fill(null).map(() => Array(5).fill(null)));
      const [selectedCell, setSelectedCell] = useState(null);
      const [direction, setDirection] = useState('across');
      const [timerSeconds, setTimerSeconds] = useState(0);
      const [timerStarted, setTimerStarted] = useState(false);
      const [solved, setSolved] = useState(false);
      const [revealed, setRevealed] = useState(false);
      const [showRevealDialog, setShowRevealDialog] = useState(false);
      const [showStats, setShowStats] = useState(false);

      // Extracted key handler so both keyboard and mobile keyboard share it
      const handleKey = useCallback((key) => {
        if (!selectedCell || solved || revealed) return;
        const { row, col } = selectedCell;

        if (key.length === 1 && /[a-zA-Z]/.test(key)) {
          if (!timerStarted) setTimerStarted(true);
          const letter = key.toUpperCase();
          const newGrid = userGrid.map(r => [...r]);
          newGrid[row][col] = letter;
          setUserGrid(newGrid);
          const newStates = cellStates.map(r => [...r]);
          newStates[row][col] = null;
          setCellStates(newStates);
          if (checkSolved(newGrid, PUZZLE.solution)) {
            setSolved(true);
            recordSolve(timerSeconds + (timerStarted ? 0 : 0));
          }
          const wordCells = getWordCells(direction, row, col, PUZZLE.solution);
          const idx = wordCells.findIndex(c => c.row === row && c.col === col);
          if (idx !== -1 && idx < wordCells.length - 1) setSelectedCell(wordCells[idx + 1]);

        } else if (key === 'Backspace') {
          if (!timerStarted) setTimerStarted(true);
          if (userGrid[row][col] !== '') {
            const newGrid = userGrid.map(r => [...r]);
            newGrid[row][col] = '';
            setUserGrid(newGrid);
            const newStates = cellStates.map(r => [...r]);
            newStates[row][col] = null;
            setCellStates(newStates);
          } else {
            const wordCells = getWordCells(direction, row, col, PUZZLE.solution);
            const idx = wordCells.findIndex(c => c.row === row && c.col === col);
            if (idx > 0) {
              const prev = wordCells[idx - 1];
              setSelectedCell(prev);
              const newGrid = userGrid.map(r => [...r]);
              newGrid[prev.row][prev.col] = '';
              setUserGrid(newGrid);
            }
          }
        }
      }, [selectedCell, direction, userGrid, cellStates, timerStarted, solved, revealed, timerSeconds]);

      // Physical keyboard
      useEffect(() => {
        function onKeyDown(e) {
          if (!selectedCell || solved || revealed) return;
          const { row, col } = selectedCell;

          if ((e.key.length === 1 && /[a-zA-Z]/.test(e.key)) || e.key === 'Backspace') {
            e.preventDefault();
            handleKey(e.key);
          } else if (e.key.startsWith('Arrow')) {
            e.preventDefault();
            if (!timerStarted) setTimerStarted(true);
            let nr = row, nc = col, newDir = direction;
            if (e.key === 'ArrowRight') { nc = col + 1; newDir = 'across'; }
            else if (e.key === 'ArrowLeft') { nc = col - 1; newDir = 'across'; }
            else if (e.key === 'ArrowDown') { nr = row + 1; newDir = 'down'; }
            else if (e.key === 'ArrowUp') { nr = row - 1; newDir = 'down'; }
            if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5 && PUZZLE.solution[nr][nc] !== null) {
              setSelectedCell({ row: nr, col: nc });
              setDirection(getValidDirection(newDir, nr, nc, PUZZLE.solution));
            }
          }
        }
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [selectedCell, direction, timerStarted, solved, revealed, handleKey]);

      // Timer
      useEffect(() => {
        if (!timerStarted || solved || revealed) return;
        const id = setInterval(() => setTimerSeconds(s => s + 1), 1000);
        return () => clearInterval(id);
      }, [timerStarted, solved, revealed]);

      // Record solve when solved becomes true
      useEffect(() => {
        if (solved) recordSolve(timerSeconds);
      }, [solved]);

      const highlightedCells = useMemo(() => {
        if (!selectedCell) return new Set();
        const cells = getWordCells(direction, selectedCell.row, selectedCell.col, PUZZLE.solution);
        return new Set(cells.map(c => `${c.row},${c.col}`));
      }, [selectedCell, direction]);

      const activeClue = useMemo(() => {
        if (!selectedCell) return null;
        const clue = getActiveClue(direction, selectedCell.row, selectedCell.col, PUZZLE.clues, PUZZLE.solution);
        return clue ? { ...clue, direction } : null;
      }, [selectedCell, direction]);

      function handleCellClick(row, col) {
        if (PUZZLE.solution[row][col] === null) return;
        if (selectedCell && selectedCell.row === row && selectedCell.col === col) {
          const toggled = direction === 'across' ? 'down' : 'across';
          setDirection(getValidDirection(toggled, row, col, PUZZLE.solution));
        } else {
          const validDir = getValidDirection(direction, row, col, PUZZLE.solution);
          setDirection(validDir);
          setSelectedCell({ row, col });
        }
      }

      function handleClueClick(dir, entry) {
        setDirection(dir);
        setSelectedCell({ row: entry.row, col: entry.col });
      }

      function handleCheck() {
        const newStates = PUZZLE.solution.map((row, r) =>
          row.map((cell, c) => {
            if (cell === null) return null;
            if (userGrid[r][c] === '') return null;
            return userGrid[r][c] === cell ? 'correct' : 'wrong';
          })
        );
        setCellStates(newStates);
      }

      function handleReveal() {
        const fullGrid = PUZZLE.solution.map(row => row.map(cell => (cell === null ? '' : cell)));
        setUserGrid(fullGrid);
        setCellStates(PUZZLE.solution.map(row => row.map(cell => (cell !== null ? 'correct' : null))));
        setRevealed(true);
        setShowRevealDialog(false);
      }

      return (
        <div>
          <Header timerSeconds={timerSeconds} timerStarted={timerStarted} solved={solved} onStatsClick={() => setShowStats(true)} />
          <div className="puzzle-layout">
            <div className="grid-section">
              <div className="grid-wrap">
                <Grid
                  solution={PUZZLE.solution}
                  userGrid={userGrid}
                  selectedCell={selectedCell}
                  highlightedCells={highlightedCells}
                  cellStates={cellStates}
                  onCellClick={handleCellClick}
                />
                <CompletionOverlay timerSeconds={timerSeconds} visible={solved} />
              </div>
              <Controls onCheck={handleCheck} onReveal={() => setShowRevealDialog(true)} solved={solved} revealed={revealed} />
              <MobileKeyboard onKey={handleKey} />
            </div>
            <ClueList clues={PUZZLE.clues} activeClue={activeClue} onClueClick={handleClueClick} />
          </div>
          {showRevealDialog && <RevealDialog onConfirm={handleReveal} onCancel={() => setShowRevealDialog(false)} />}
          {showStats && <StatsModal onClose={() => setShowStats(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
