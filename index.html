<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Croosly</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      font-family: 'Libre Baskerville', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
      color: #1a1a1a;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      width: 100%;
      max-width: 640px;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 20px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 10px;
    }
    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      font-style: italic;
    }

    .cards {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 640px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: block;
      text-decoration: none;
      color: #1a1a1a;
      border: 2px solid #1a1a1a;
      padding: 32px 28px;
      flex: 1;
      min-width: 220px;
      max-width: 280px;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .card:hover { background: #1a1a1a; color: #f5f0e8; }
    .card:hover .card-meta { color: #bbb; }
    .card:hover .card-grid-cell { border-color: #555; background: #333; }
    .card:hover .card-grid-cell.black { background: #f5f0e8; }

    .card-size {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .card-grid {
      display: grid;
      gap: 2px;
      margin-bottom: 20px;
    }
    .card-grid.mini { grid-template-columns: repeat(5, 16px); }
    .card-grid.midi { grid-template-columns: repeat(7, 12px); }
    .card-grid.daily { grid-template-columns: repeat(15, 6px); gap: 1px; }

    .card-grid-cell {
      border: 1.5px solid #1a1a1a;
      background: #fff;
      transition: background 0.15s, border-color 0.15s;
    }
    .card-grid.mini .card-grid-cell { width: 16px; height: 16px; }
    .card-grid.midi .card-grid-cell { width: 12px; height: 12px; }
    .card-grid.daily .card-grid-cell { width: 6px; height: 6px; border-width: 0.5px; }
    .card-grid-cell.black { background: #1a1a1a; border-color: #1a1a1a; }

    .card-meta {
      font-size: 12px;
      color: #666;
      line-height: 1.7;
      transition: color 0.15s;
    }

    .editor-link {
      margin-top: 48px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .editor-link a { color: #888; text-decoration: none; border-bottom: 1px solid #ccc; }
    .editor-link a:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  </style>
</head>
<body>

  <div class="header">
    <div class="eyebrow">The Daily Crossword</div>
    <h1 class="title">Croosly</h1>
    <p class="subtitle">Choose your puzzle</p>
  </div>

  <div class="cards">

    <a class="card" href="mini.html">
      <div class="card-size">Mini · 5×5</div>
      <div class="card-title">Mini</div>
      <!-- Mini grid preview: black cells at (1,1),(1,3),(3,1),(3,3) -->
      <div class="card-grid mini">
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
      </div>
      <div class="card-meta">
        6 clues · ~2 min<br>
        New puzzle daily
      </div>
    </a>

    <a class="card" href="midi.html">
      <div class="card-size">Midi · 7×7</div>
      <div class="card-title">Midi</div>
      <!-- preview -->
      <!-- Midi grid preview: black cells at all odd×odd positions -->
      <div class="card-grid midi">
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div><div class="card-grid-cell black"></div><div class="card-grid-cell"></div>
        <div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div><div class="card-grid-cell"></div>
      </div>
      <div class="card-meta">
        8 clues · ~8 min<br>
        New puzzle daily
      </div>
    </a>

  </div>

  <p class="editor-link">
    Want to create your own puzzle? <a href="editor.html">Open the editor →</a>
  </p>

</body>
</html>
