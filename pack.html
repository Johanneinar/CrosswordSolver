<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Croosly">
  <meta property="og:title" content="Themed Crossword Pack — Free Puzzles | Croosly">
  <meta property="og:description" content="A themed crossword pack on Croosly — a curated set of free online puzzles built around a single topic.">
  <meta property="og:url" content="https://croosly.com/pack.html">

  <meta name="twitter:image" content="https://croosly.com/og-image.png">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="packs.js"></script>
  <script src="puzzle-list.js"></script>
  <script src="analytics.js"></script>
  <script src="game.js"></script>
</head>
<body>
  <div id="content"></div>

  <footer class="site-footer">
    <p>Made by Jóhann Ísaksson in Reykjavík</p>
    <p><a href="about.html">About</a> · <a href="privacy.html">Privacy</a></p>
    <p>© 2026 Croosly</p>
  </footer>

  <script>
    (function () {
      const content = document.getElementById('content');

      function showError(title, message) {
        content.innerHTML = '';
        const wrap = document.createElement('main');
        wrap.className = 'pack-error';
        wrap.innerHTML =
          '<h1>' + title + '</h1>' +
          '<p>' + message + '</p>' +
          '<a href="index.html">← All Puzzles</a>';
        content.appendChild(wrap);
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = function () { reject(new Error('Failed to load ' + src)); };
          document.head.appendChild(s);
        });
      }

      function renderList(pack, statsKey) {
        document.title = pack.title + ' — Croosly';
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.setAttribute('content', pack.description);

        window.renderPuzzleList({
          container: content,
          eyebrowText: '← All Puzzles',
          eyebrowHref: 'index.html',
          emoji: pack.emoji,
          title: pack.title,
          description: pack.description,
          accentColor: pack.color,
          puzzles: pack.puzzles,
          statsKey: statsKey,
          hrefForPuzzle: function (i) {
            const qp = new URLSearchParams(window.location.search);
            qp.set('p', String(i));
            return 'pack.html?' + qp.toString();
          },
        });
      }

      function renderPlay(pack, statsKey, puzzleIndex) {
        const safeIndex = Math.max(0, Math.min(pack.puzzles.length - 1, puzzleIndex | 0));
        document.title = pack.title + ' #' + (safeIndex + 1) + ' — Croosly';
        document.body.style.setProperty('--pack-accent', pack.color);

        content.innerHTML = '';
        const root = document.createElement('div');
        root.id = 'root';
        content.appendChild(root);

        const backUrl = 'pack.html?id=' + encodeURIComponent(pack.id);
        const shareUrl = 'https://croosly.com/pack.html?id=' + encodeURIComponent(pack.id) +
          '&p=' + safeIndex;

        window.mountCrosswordGame({
          rootId: 'root',
          title: pack.title,
          eyebrowText: '← Back to pack',
          eyebrowHref: backUrl,
          statsKey: statsKey,
          puzzles: pack.puzzles,
          shareLabel: pack.title,
          shareUrl: shareUrl,
          initialPuzzleIndex: safeIndex,
          packId: pack.id,
        });
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        showError('No pack selected', 'Add ?id=… to the URL or pick one from the home page.');
        return;
      }

      const meta = (window.PACK_REGISTRY || []).find(function (p) { return p.id === id; });
      if (!meta) {
        showError("Pack not found", "We don't have a pack with the id '" + id + "'. It may have been renamed or removed.");
        return;
      }

      const statsKey = 'croosly-pack-' + id + '-stats';

      const canonicalLink = document.querySelector('link[rel="canonical"]');
      if (canonicalLink) {
        canonicalLink.setAttribute('href', 'https://croosly.com/pack.html?id=' + encodeURIComponent(id));
      }

      loadScript(meta.file).then(function () {
        const pack = window[meta.global];
        if (!pack) {
          showError('Pack failed to load', 'The pack file did not register correctly. Please try again later.');
          return;
        }
        const playParam = params.get('p');
        if (playParam !== null) {
          renderPlay(pack, statsKey, parseInt(playParam, 10));
        } else {
          renderList(pack, statsKey);
        }
      }).catch(function (err) {
        showError('Pack failed to load', err.message);
      });
    })();
  </script>
</body>
</html>
