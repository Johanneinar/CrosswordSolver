<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Crossword</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      font-family: 'Libre Baskerville', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      color: #1a1a1a;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 32px;
      width: 100%;
      max-width: 780px;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 16px;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }
    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .header-dateline {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-bottom: 4px;
    }
    .header-timer {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: #444;
    }

    /* MAIN LAYOUT */
    .puzzle-layout {
      display: flex;
      gap: 48px;
      width: 100%;
      max-width: 780px;
      align-items: flex-start;
    }
    .grid-section { flex-shrink: 0; }
    .grid-wrap { position: relative; display: inline-block; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      grid-template-rows: repeat(5, 58px);
      border: 2px solid #1a1a1a;
    }
    .cell {
      width: 58px;
      height: 58px;
      border: 1px solid #1a1a1a;
      background: #ffffff;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }
    .cell.black { background: #1a1a1a; cursor: default; }
    .cell.highlighted { background: #dce8f5; }
    .cell.selected { background: #d4a843; }
    .cell.correct { background: #c8e6c9; }
    .cell.wrong { background: #ffcdd2; }
    .cell-number {
      position: absolute;
      top: 3px;
      left: 3px;
      font-size: 9px;
      font-weight: 400;
      font-family: 'Libre Baskerville', serif;
      color: #1a1a1a;
      line-height: 1;
    }

    /* CONTROLS */
    .controls { display: flex; gap: 12px; margin-top: 18px; }
    .btn {
      padding: 8px 20px;
      font-family: 'Libre Baskerville', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1.5px solid #1a1a1a;
      background: transparent;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #1a1a1a; color: #f5f0e8; }
    .btn.btn-primary { background: #1a1a1a; color: #f5f0e8; }
    .btn.btn-primary:hover { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:disabled:hover { background: transparent; color: #1a1a1a; }
    .btn.btn-primary:disabled:hover { background: #1a1a1a; color: #f5f0e8; }

    /* CLUES */
    .clues-section { flex: 1; min-width: 0; }
    .clue-group { margin-bottom: 24px; }
    .clue-group-title {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .clue {
      display: flex;
      gap: 8px;
      padding: 4px 6px;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 2px;
      cursor: pointer;
    }
    .clue:hover { background: rgba(212, 168, 67, 0.2); }
    .clue.active { background: #d4a843; }
    .clue-num { font-weight: 700; flex-shrink: 0; min-width: 18px; }

    /* REVEAL DIALOG */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .dialog-card {
      background: #f5f0e8;
      border: 2px solid #1a1a1a;
      padding: 32px 40px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    .dialog-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .dialog-body {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
      font-style: italic;
    }
    .dialog-buttons { display: flex; gap: 12px; justify-content: center; }

    /* COMPLETION OVERLAY */
    .completion-overlay {
      position: absolute;
      inset: -2px;
      background: rgba(245, 240, 232, 0.94);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border: 2px solid #1a1a1a;
      pointer-events: none;
    }
    .completion-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .completion-time {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .completion-rule { width: 40px; height: 1px; background: #1a1a1a; margin-bottom: 14px; }
    .completion-sub { font-size: 12px; color: #888; font-style: italic; }

    /* RESPONSIVE */
    @media (max-width: 639px) {
      .puzzle-layout { flex-direction: column; align-items: center; }
      .header-title { font-size: 32px; }
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      return (
        <header className="header">
          <h1 className="header-title">Mini Crossword</h1>
        </header>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
